# MagicSteam — nginx reverse-proxy configuration
#
# Deploy:
#   sudo cp nginx.conf /etc/nginx/sites-available/magicsteam
#   sudo ln -s /etc/nginx/sites-available/magicsteam /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace every PLACEHOLDER comment before deploying.

# ---------------------------------------------------------------------------
# Rate-limit zone
# Rate-limit on X-Forwarded-For (real client IP, not load-balancer IP).
# 10 req/s per IP with a burst of 5 → a user typing fast gets ~15 HTMX
# search calls/sec covered; a flood bot hits 429 immediately.
# 10 MB zone holds ~160 000 distinct IPs before LRU eviction.
# ---------------------------------------------------------------------------
limit_req_zone $http_x_forwarded_for zone=search:10m rate=10r/s;

# ---------------------------------------------------------------------------
# Upstream: Gunicorn + UvicornWorker running on localhost:8000
# keepalive 32: reuse TCP connections to Gunicorn workers (avoids TCP handshake
# per request; matches gunicorn.conf.py keepalive=5).
# ---------------------------------------------------------------------------
upstream magicsteam_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;   # PLACEHOLDER: replace _ with your domain or public IP

    # ── Compression ──────────────────────────────────────────────────────────
    # HTMX card-browse HTML fragments: ~4 KB raw → ~1.2 KB gzip (70% reduction).
    # At 171 peak QPS this saves ~460 KB/s of upload bandwidth.
    gzip on;
    gzip_types text/html application/json text/css application/javascript text/plain;
    gzip_min_length 256;    # don't bother compressing tiny responses
    gzip_comp_level 4;      # level 4: good ratio, low CPU cost
    gzip_vary on;           # tell CDNs the response varies on Accept-Encoding

    # ── Search HTMX endpoints — rate limited ─────────────────────────────────
    # /api/catalogue/cards/browse  — homepage live search
    # /api/catalogue/cards/picker  — /sell page card picker
    location ~ ^/api/catalogue/cards/(browse|picker) {
        limit_req zone=search burst=5 nodelay;

        proxy_pass         http://magicsteam_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";            # enable keepalive to upstream
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_read_timeout 10s;                      # search should never take >10 s
    }

    # ── Static files — served by nginx, bypasses FastAPI entirely ────────────
    # Card images load from Scryfall CDN, so /static/ is only CSS, JS, icons.
    # Bandwidth impact is negligible; long cache headers are safe (content-hashed).
    location /static/ {
        alias /path/to/magicsteam/app/static/;   # PLACEHOLDER: absolute path to app/static/
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Everything else — proxy to FastAPI ───────────────────────────────────
    location / {
        proxy_pass         http://magicsteam_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_read_timeout 30s;
    }
}


{% extends "base.html" %}
{% block title %}Checkout — MagicSteam{% endblock %}
{% block content %}

<div class="max-w-lg mx-auto space-y-6">
    <h1 class="text-xl font-bold">Checkout</h1>

    <!-- Order summary -->
    <div id="order-summary" class="bg-white border border-gray-200 rounded-lg p-5">
        <div class="text-sm text-gray-400 mb-4">Loading order…</div>
    </div>

    <!-- Payment method -->
    <div class="bg-white border border-gray-200 rounded-lg p-5 space-y-4">
        <h2 class="font-semibold text-sm">Payment Method</h2>

        <label class="flex items-start gap-3 cursor-pointer">
            <input type="radio" name="payment" value="cod" checked class="mt-1 accent-gray-900">
            <div>
                <div class="font-medium text-sm">Cash on Delivery — Meet in Person</div>
                <div class="text-xs text-gray-500 mt-0.5">Pay cash when you collect. Arrange a meetup with the seller.</div>
            </div>
        </label>

        <div id="cod-section" class="pl-6 space-y-3">
            <div class="text-xs font-semibold text-gray-600 uppercase tracking-wide">Pickup Location</div>

            <div class="space-y-2">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="location" value="The Hearth" checked class="accent-gray-900">
                    <span class="text-sm">The Hearth <span class="text-xs text-gray-400">(default LGS)</span></span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="location" value="other" class="accent-gray-900">
                    <span class="text-sm">Other location</span>
                </label>
                <input type="text" id="other-location-input"
                    placeholder="Describe meeting point…"
                    class="hidden w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-600">
            </div>
        </div>
    </div>

    <!-- Confirm button -->
    <button id="confirm-btn"
        class="w-full py-3 bg-gray-900 text-white rounded-lg font-semibold text-sm hover:bg-gray-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
        Confirm Order
    </button>

    <div id="checkout-msg" class="hidden text-sm text-center"></div>
</div>

{% endblock %}
{% block scripts %}
<script>
var _ORDER_ID = {{ order_id }};
</script>
<script src="/static/js/checkout.js?v=1" defer></script>
{% endblock %}

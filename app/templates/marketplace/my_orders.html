{% extends "base.html" %}
{% block title %}My Orders — MagicSteam{% endblock %}
{% block content %}

<h1 class="text-xl font-bold mb-6">My Orders</h1>

<div class="flex gap-2 mb-5 text-xs">
    <button id="tab-purchases" onclick="setOrderTab('purchases')"
        class="px-3 py-1.5 rounded-full font-semibold bg-gray-900 text-white transition-colors">Purchases</button>
    <button id="tab-sales" onclick="setOrderTab('sales')"
        class="px-3 py-1.5 rounded-full font-semibold bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">Sales</button>
</div>

<div id="orders-container" class="divide-y divide-gray-100">
    <div class="py-8 text-center text-sm text-gray-400">Loading…</div>
</div>

{% endblock %}
{% block scripts %}
<script>
(function () {
    var _token = localStorage.getItem('mtg_token');
    if (!_token) { window.location.href = '/auth/login?next=/my-orders'; return; }

    var _currentTab = 'purchases';
    var _data = null;

    var STATUS_COLORS = {
        pending:   'bg-amber-100 text-amber-800',
        paid:      'bg-blue-100 text-blue-800',
        shipped:   'bg-purple-100 text-purple-800',
        completed: 'bg-green-100 text-green-800',
        cancelled: 'bg-gray-100 text-gray-500',
    };

    function _fmtDate(iso) {
        if (!iso) return '—';
        return new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function setOrderTab(tab) {
        _currentTab = tab;
        document.getElementById('tab-purchases').className =
            'px-3 py-1.5 rounded-full font-semibold transition-colors ' +
            (tab === 'purchases' ? 'bg-gray-900 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200');
        document.getElementById('tab-sales').className =
            'px-3 py-1.5 rounded-full font-semibold transition-colors ' +
            (tab === 'sales' ? 'bg-gray-900 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200');
        if (_data) render(_data[tab === 'purchases' ? 'purchases' : 'sales'], tab);
    }
    window.setOrderTab = setOrderTab;

    function render(orders, tab) {
        var c = document.getElementById('orders-container');
        if (!orders || !orders.length) {
            c.innerHTML = '<div class="py-16 text-center text-sm text-gray-400">No ' + tab + ' yet.</div>';
            return;
        }
        c.innerHTML = orders.map(function (o) {
            var statusCls = STATUS_COLORS[o.status] || 'bg-gray-100 text-gray-500';
            var other = tab === 'purchases' ? ('Seller: <a href="/u/' + o.seller_username + '" class="underline hover:text-gray-900">' + o.seller_username + '</a>') :
                                              ('Buyer: <a href="/u/' + o.buyer_username + '" class="underline hover:text-gray-900">' + o.buyer_username + '</a>');
            var pickup = o.pickup_location ? (' &middot; ' + _escHtml(o.pickup_location)) : '';
            return '<div class="py-4 flex items-center gap-4">' +
                (o.item_image ? '<img src="' + o.item_image + '" class="w-12 rounded shadow-sm flex-shrink-0 object-cover" alt="">' :
                    '<div class="w-12 h-16 bg-gray-100 rounded flex-shrink-0"></div>') +
                '<div class="flex-1 min-w-0">' +
                    '<div class="font-medium text-sm">' + _escHtml(o.item_name) + '</div>' +
                    '<div class="text-xs text-gray-500 mt-0.5">' + (o.item_set ? _escHtml(o.item_set) : '') + '</div>' +
                    '<div class="text-xs text-gray-400 mt-0.5">' + other + pickup + '</div>' +
                    '<div class="text-xs text-gray-400">' + _fmtDate(o.created_at) + '</div>' +
                '</div>' +
                '<div class="text-right flex-shrink-0 space-y-1">' +
                    '<div class="font-semibold text-sm">' + o.total_price.toFixed(3) + ' OMR</div>' +
                    '<span class="inline-block text-[10px] font-semibold px-2 py-0.5 rounded ' + statusCls + '">' + o.status.toUpperCase() + '</span>' +
                    (o.status === 'pending' && tab === 'purchases' ?
                        '<div><a href="/checkout/' + o.id + '" class="text-xs underline text-blue-600 hover:text-blue-800">Complete checkout</a></div>' : '') +
                '</div>' +
                '</div>';
        }).join('');
    }

    function _escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    fetch('/api/marketplace/orders/mine', {
        headers: { 'Authorization': 'Bearer ' + _token }
    }).then(function (r) {
        if (r.status === 401) { localStorage.removeItem('mtg_token'); window.location.href = '/auth/login?next=/my-orders'; return null; }
        return r.json();
    }).then(function (d) {
        if (!d) return;
        _data = d;
        render(d.purchases, 'purchases');
    }).catch(function () {
        document.getElementById('orders-container').innerHTML =
            '<div class="py-8 text-center text-sm text-red-500">Failed to load orders.</div>';
    });
})();
</script>
{% endblock %}

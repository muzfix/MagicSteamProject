version: "3.9"

services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mtguser
      POSTGRES_PASSWORD: mtgpass
      POSTGRES_DB: mtg_marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mtguser:mtgpass@db:5432/mtg_marketplace
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  postgres_data:
